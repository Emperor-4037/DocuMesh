version: '3.8'

services:
  # ─── API Gateway ───
  gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-in-production}
      - REDIS_HOST=redis
      - POSTGRES_SERVER=postgres
    volumes:
      - ./gateway/app:/app/app
      - ./shared:/app/shared
    depends_on:
      - paraphrase-service
      - grammar-service
      - simplify-service
      - tone-service
      - summarize-service
      - rag-service

  # ─── NLP Services ───
  paraphrase-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: paraphrase-service }
    volumes:
      - ./services/paraphrase-service/app:/app/app
      - ./shared:/app/shared

  grammar-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: grammar-service }
    volumes:
      - ./services/grammar-service/app:/app/app
      - ./shared:/app/shared

  simplify-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: simplify-service }
    volumes:
      - ./services/simplify-service/app:/app/app
      - ./shared:/app/shared

  tone-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: tone-service }
    volumes:
      - ./services/tone-service/app:/app/app
      - ./shared:/app/shared

  summarize-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: summarize-service }
    volumes:
      - ./services/summarize-service/app:/app/app
      - ./shared:/app/shared

  # ─── RAG Service + Celery Worker ───
  rag-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: rag-service }
    volumes:
      - ./services/rag-service/app:/app/app
      - ./shared:/app/shared
    depends_on:
      - qdrant
      - redis
      - postgres

  rag-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: rag-service }
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info", "-Q", "rag-queue"]
    volumes:
      - ./services/rag-service/app:/app/app
      - ./shared:/app/shared
    depends_on:
      - redis
      - qdrant

  # ─── Data Stores ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=aiplatform
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── Observability Stack ───
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  qdrant_data:
  pg_data:
  grafana_data:
