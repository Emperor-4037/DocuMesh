version: '3.8'

services:
  # ─── Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
        VITE_DEMO_TOKEN: demo-token
    ports:
      - "3000:80"
    depends_on:
      - gateway

  # ─── API Gateway ───
  gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-in-production}
      - REDIS_HOST=redis
      - POSTGRES_SERVER=postgres
    volumes:
      - ./gateway/app:/app/app
      - ./shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      paraphrase-service:
        condition: service_started
      grammar-service:
        condition: service_started
      simplify-service:
        condition: service_started
      tone-service:
        condition: service_started
      summarize-service:
        condition: service_started
      rag-service:
        condition: service_started

  # ─── NLP Services ───
  paraphrase-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: paraphrase-service }
    volumes:
      - ./services/paraphrase-service/app:/app/app
      - ./shared:/app/shared

  grammar-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: grammar-service }
    volumes:
      - ./services/grammar-service/app:/app/app
      - ./shared:/app/shared

  simplify-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: simplify-service }
    volumes:
      - ./services/simplify-service/app:/app/app
      - ./shared:/app/shared

  tone-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: tone-service }
    volumes:
      - ./services/tone-service/app:/app/app
      - ./shared:/app/shared

  summarize-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: summarize-service }
    volumes:
      - ./services/summarize-service/app:/app/app
      - ./shared:/app/shared

  # ─── RAG Service + Celery Worker ───
  rag-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: rag-service }
    volumes:
      - ./services/rag-service/app:/app/app
      - ./shared:/app/shared
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  rag-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args: { SERVICE_NAME: rag-service }
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info", "-Q", "rag-queue"]
    volumes:
      - ./services/rag-service/app:/app/app
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  # ─── Data Stores ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=aiplatform
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── Observability Stack ───
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  qdrant_data:
  pg_data:
  grafana_data:
